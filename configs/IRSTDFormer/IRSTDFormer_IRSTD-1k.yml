__include__: [
  '../dataset/IRSTD-1k_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml',
]

output_dir: ./outputs/IRSTDFormer_IRSTD-1k

DEIM:
  encoder: LiteEncoder

PostProcessor:
  num_top_queries: 100
HGNetv2:
  name: 'Atto'
  return_idx: [2]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

LiteEncoder:
  in_channels: [256]
  feat_strides: [16]
  hidden_dim: 64
  expansion: 0.34
  depth_mult: 0.5
  act: 'silu'

DEIMTransformer:
  feat_channels: [64, 64]
  feat_strides: [16, 32]
  hidden_dim: 64
  num_levels: 2
  num_points: [4, 2]

  use_bbox_enhancement: True
  mbe_alpha: 0.1
  use_lqm: True
  lqm_beta: 0.08
  lqm_topk: 24
 
  num_layers: 3
  eval_idx: -1
  num_queries: 100
  dim_feedforward: 160
  share_bbox_head: True
  use_gateway: False

epoches: 72 

warmup_iter: 50
flat_epoch: 36 
no_aug_epoch: 20
lr_gamma: 0.5

optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.001
    - params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.001
      weight_decay: 0.
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

eval_spatial_size: [512, 512]
train_dataloader:
  total_batch_size: 24
  num_workers: 12
  dataset: 
    transforms:
      ops:
        - {type: Mosaic, output_size: 160, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.8, 1.2],
           probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.3}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.15} 
        - {type: SanitizeBoundingBoxes, min_size: 2} 
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [512, 512], }
        - {type: SanitizeBoundingBoxes, min_size: 2}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 40, 60]
      mosaic_prob: 0.3

  collate_fn:
    mixup_prob: 0.0
    mixup_epochs: [40000, 15000]
    copyblend_prob: 0.0
    copyblend_epochs: [40000, 15000]

    stop_epoch: 52
    ema_restart_decay: 0.9999
    base_size: 512
    base_size_repeat: ~

val_dataloader:
  total_batch_size: 24
  num_workers: 6
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [512, 512], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False


DEIMCriterion:
  losses: ['mal', 'boxes']
  use_uni_set: False

  matcher:
    matcher_change_epoch: 48
